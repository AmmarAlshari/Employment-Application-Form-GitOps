apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-deployment
  labels:
    app: nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nest
  template:
    metadata:
      labels:
        app: nest
    spec:
      containers:
        - name: nest-container
          image: ammaralshari/nest-backend:v2
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: mysql-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: DB_PASSWORD

            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: DB_DATABASE
---
apiVersion: v1
kind: Service
metadata:
  name: nest-service
spec:
  selector:
    app: nest
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
